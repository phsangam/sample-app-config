apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dotnet-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/phsangam/sample-app-config.git
    targetRevision: main
    path: helm/dotnet-api
  destination:
    server: https://kubernetes.default.svc
    namespace: uat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
